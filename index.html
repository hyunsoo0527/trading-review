<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeAnalyze</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">
                TradeAnalyze
            </div>
        </div>
    </nav>

    <header>
        <div class="header-content">
            <h1>차트 흐름 간단 분석</h1>
            <p>일봉, 시간봉, 분봉 차트를 업로드하면 AI가 흐름을 분석합니다.</p>
        </div>
    </header>

    <main>
        <section id="upload-section">
            <h2>차트 업로드</h2>
            <p>분석할 차트 이미지를 시간대별로 업로드하세요.</p>
            <div class="chart-upload-container">
                <div class="upload-box">
                    <p>일봉 차트</p>
                    <div class="upload-placeholder">
                        <span class="material-icons">upload</span>
                        <p>이미지를 드래그하거나 클릭해서 업로드</p>
                    </div>
                </div>
                <div class="upload-box">
                    <p>시간봉 차트</p>
                    <div class="upload-placeholder">
                        <span class="material-icons">upload</span>
                        <p>이미지를 드래그하거나 클릭해서 업로드</p>
                    </div>
                </div>
                <div class="upload-box">
                    <p>분봉 차트</p>
                    <div class="upload-placeholder">
                        <span class="material-icons">upload</span>
                        <p>이미지를 드래그하거나 클릭해서 업로드</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="start-analysis-section">
            <button class="cta-button">분석 시작</button>
        </section>
    </main>

    <footer>
        <p>본 서비스는 차트 흐름을 간단히 정리하는 도구이며, 투자 판단을 위한 참고용으로만 제공됩니다.</p>
        <p>&copy; 2024 TradeAnalyze. 모든 권리 보유.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
