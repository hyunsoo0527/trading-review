<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분석 결과 - 트레이딩 리뷰 허브</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <header class="analysis-header">
        <h1>분석 결과</h1>
        <p id="analysis-date">-</p>
    </header>

    <main class="analysis-main">
        <section class="analysis-section conclusion-section">
            <h2>종합 결론</h2>
            <div class="card">
                <p id="ai-conclusion">AI가 차트를 분석하고 있습니다. 잠시만 기다려주세요...</p>
            </div>
        </section>

        <section class="analysis-section timeframe-stack-section">
            <h2>타임프레임 스택 (AI 분석)</h2>
            <div id="timeframe-grid" class="timeframe-grid">
                <!-- AI 분석 결과가 여기에 동적으로 추가됩니다. -->
            </div>
        </section>

        <section class="analysis-section chart-analysis-section">
            <h2>차트 & 진입 근거</h2>
            <div id="chart-analysis-container">
                <!-- 업로드된 차트와 AI 분석 결과가 여기에 동적으로 추가됩니다. -->
            </div>
        </section>
    </main>

    <!-- 이 페이지의 로직을 처리할 스크립트 -->
    <script src="analysis.js"></script>
</body>
</html>
